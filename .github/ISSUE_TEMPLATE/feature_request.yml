name: Feature Request
description: Suggest a new feature or enhancement for LLMBench
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thank you for suggesting a feature! Please describe what you'd like and why.

  - type: textarea
    id: problem
    attributes:
      label: Problem or Motivation
      description: What problem does this feature solve? What use case is not currently supported?
      placeholder: "I'm always frustrated when ..."
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: Describe the feature you'd like to see.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: Any alternative solutions or workarounds you've considered.

  - type: dropdown
    id: package
    attributes:
      label: Affected Package
      description: Which package would this feature affect?
      multiple: true
      options:
        - "@llmbench/cli"
        - "@llmbench/core"
        - "@llmbench/db"
        - "@llmbench/web"
        - "@llmbench/types"
        - "@llmbench/ui"
        - New package
        - Not sure

  - type: dropdown
    id: priority
    attributes:
      label: Priority
      description: How important is this feature to your workflow?
      options:
        - "Nice to have"
        - "Important - working around it currently"
        - "Critical - blocking my use case"

  - type: textarea
    id: context
    attributes:
      label: Additional Context
      description: Examples, mockups, links to similar tools, or any other context.
